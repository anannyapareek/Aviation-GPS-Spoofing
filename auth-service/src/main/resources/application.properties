spring.application.name=auth-service
server.port=8080

# Dynamic Database Configuration (Pulls from Render env variables)
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:aviation_siem}?useSSL=true&trustServerCertificate=true&sslMode=REQUIRED
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:Abc123xyz}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Dynamic JWT Configuration
app.jwt.secret=${JWT_SECRET:9a4f4c354352412b3637446d6e714462614b43694c506173776f72643132333435363738}
app.jwt.expiration-ms=3600000